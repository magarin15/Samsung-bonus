<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>삼성전자 보상 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06101d;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;color:#ddeeff;}
table{border-collapse:collapse;}
button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;


// ── 세금 ──
const TB=[{l:14e6,r:.066},{l:50e6,r:.165},{l:88e6,r:.264},{l:150e6,r:.385},{l:300e6,r:.418},{l:500e6,r:.451},{l:Infinity,r:.495}];
const tax=i=>{if(i<=0)return 0;let t=0,p=0;for(const b of TB){if(i<=p)break;t+=(Math.min(i,b.l)-p)*b.r;p=b.l;}return Math.round(t);};
const mTax=(base,add)=>tax(base+add)-tax(base);

// ── OPI ──
const OPI=[{max:0,r:0},{max:10,r:0},{max:20,r:14},{max:35,r:30},{max:50,r:40},{max:70,r:47},{max:999,r:50}];
const opiR=ds=>{for(const o of OPI)if(ds<=o.max)return o.r;return 50;};

// ── 특별성과급 ──
const DS_HC=79000;
const DIV={memory:{hc:27000,pw:.90,d:false},lsi:{hc:11500,pw:.04,d:true},foundry:{hc:11500,pw:.06,d:true},support:{hc:29000,pw:null,d:false}};
const sp=(k,w,yr)=>{
  if(k==='support')return Math.round(sp('memory',w,yr)*.70);
  const d=DIV[k],pool=w*.105,cph=(pool*.40)/DS_HC;
  if(d.d)return yr>=2027?Math.round(cph*.6):Math.round(cph);
  return Math.round(cph+(pool*.60*d.pw)/d.hc);
};

// ── PSU ──
const PSU_BASE=85385;
const PSU_CL={
  cl2:{label:"CL1~2 (사원·대리)",sh:200},
  cl3:{label:"CL3~4 (과장·부장)",sh:300},
};
const PSU_M=[{a:0,b:20,m:0},{a:20,b:40,m:.5},{a:40,b:60,m:1},{a:60,b:80,m:1.3},{a:80,b:100,m:1.7},{a:100,b:999,m:2}];
const psuM=p=>{for(const r of PSU_M)if(p>=r.a&&p<r.b)return r.m;return 2;};

// ── 포맷 ──
const fw=v=>{const a=Math.abs(v);if(a>=1e8)return`${(v/1e8).toFixed(2)}억원`;if(a>=1e4)return`${Math.round(v/1e4).toLocaleString()}만원`;return`${Math.round(v)}원`;};
const fs2=v=>v>=1e8?`${(v/1e8).toFixed(1)}억`:v>=1e4?`${Math.round(v/1e4)}만`:`${Math.round(v)}`;

// ── 색상 ──
const C={bg:"#06101d",bd:"rgba(255,255,255,0.09)",blue:"#1499ff",cyan:"#00d8ff",green:"#00f090",yellow:"#ffd060",red:"#ff5050",purple:"#b060ff",orange:"#ff9030",muted:"#4e6880",sub:"#8aaabb",text:"#ddeeff"};

// 슬라이더 스타일 전역 주입
const SliderStyle=()=>(
  <style>{`
    input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:rgba(255,255,255,0.2);outline:none;cursor:pointer;width:100%;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;box-shadow:0 0 6px rgba(20,153,255,0.7);}
    input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;box-shadow:0 0 6px rgba(20,153,255,0.7);}
    input[type=range]::-ms-thumb{width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;}
    input[type=number]{-moz-appearance:textfield;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  `}</style>
);
const Card=({children,ac,style={}})=>{
  const bg=ac==='green'?"rgba(0,240,144,0.07)":ac==='purple'?"rgba(176,96,255,0.08)":"rgba(255,255,255,0.04)";
  const bd=ac==='green'?"rgba(0,240,144,0.35)":ac==='purple'?"rgba(176,96,255,0.35)":C.bd;
  return <div style={{background:bg,border:`1px solid ${bd}`,borderRadius:12,padding:"14px 16px",...style}}>{children}</div>;
};
const Label=({c,children})=><div style={{fontSize:10,color:c||C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>{children}</div>;

// ── 연도별 계산 ──
const calcYr=(dk,sal,ds,yr)=>{
  const og=Math.round(sal*opiR(ds)/100);
  // 특별성과급 지급 조건: DS 영업이익 기준 달성 시에만 지급
  const threshold=SP_THRESHOLD(yr);
  const sg=ds>=threshold?sp(dk,ds*1e12,yr):0; // 미달 시 0
  const tg=og+sg;
  const ot=mTax(sal,og),st=mTax(sal+og,sg);
  return {yr,og,sg,tg,ot,st,tt:ot+st,on:og-ot,sn:sg-st,tn:tg-ot-st,
    spMet:ds>=threshold,threshold}; // 지급 조건 달성 여부
};

// ── 아파트 ──
const APTS=[
  {a:"강남구",  c:"서울",p:26e8,col:"#ff5050",e:"🏆",apt:"래미안대치팰리스",  url:"https://map.naver.com/v5/search/래미안대치팰리스"},
  {a:"서초구",  c:"서울",p:22e8,col:"#ff7030",e:"🏆",apt:"아크로리버파크",    url:"https://map.naver.com/v5/search/아크로리버파크"},
  {a:"송파구",  c:"서울",p:19e8,col:"#ff9030",e:"⭐",apt:"헬리오시티",        url:"https://map.naver.com/v5/search/헬리오시티"},
  {a:"마포·용산",c:"서울",p:17e8,col:"#ffd060",e:"⭐",apt:"마포래미안푸르지오",url:"https://map.naver.com/v5/search/마포래미안푸르지오"},
  {a:"성동·광진",c:"서울",p:15e8,col:"#c8d060",e:"⭐",apt:"왕십리센트라스",   url:"https://map.naver.com/v5/search/왕십리센트라스"},
  {a:"노원구",  c:"서울",p:13e8,col:"#00d8ff",e:"✅",apt:"상계주공16단지",    url:"https://map.naver.com/v5/search/상계주공16단지"},
  {a:"강서·양천",c:"서울",p:11e8,col:"#00d8ff",e:"✅",apt:"목동신시가지14단지",url:"https://map.naver.com/v5/search/목동신시가지14단지"},
  {a:"분당·판교",c:"경기",p:14e8,col:"#00f090",e:"✅",apt:"판교알파리움1단지", url:"https://map.naver.com/v5/search/판교알파리움1단지"},
  {a:"광교·수원",c:"경기",p:9e8, col:"#4dff90",e:"✅",apt:"광교중흥S클래스",   url:"https://map.naver.com/v5/search/광교중흥S클래스"},
  {a:"용인·기흥",c:"경기",p:75e7,col:"#80ffa0",e:"✅",apt:"힐스테이트기흥",   url:"https://map.naver.com/v5/search/힐스테이트기흥"},
  {a:"인천 연수",c:"인천",p:65e7,col:"#b060ff",e:"✅",apt:"송도더샵퍼스트월드",url:"https://map.naver.com/v5/search/송도더샵퍼스트월드"},
  {a:"인천 계양",c:"인천",p:5e8, col:"#c080ff",e:"✅",apt:"힐스테이트자이계양",url:"https://map.naver.com/v5/search/힐스테이트자이계양"},
  {a:"김포·파주",c:"경기",p:45e7,col:"#8aaabb",e:"✅",apt:"한강메트로자이",    url:"https://map.naver.com/v5/search/한강메트로자이"},
];

// ── 특별성과급 지급 조건 (DS 영업이익 기준, 합의문) ──
// 2026~2028: DS 200조 달성 시 지급, 2029~2035: 100조 달성 시 지급
const SP_THRESHOLD=(yr)=>yr<=2028?200:100;

// ── CL별 샐러리캡 (2026 합의, 만원 기준) ──
const SAL_CAP={cl2:8000,cl3:11000,cl4:13000};
const CL_BY_DIV={memory:"cl3",lsi:"cl3",foundry:"cl3",support:"cl3"};

const CONS={2026:360,2027:440,2028:550,2029:480,2030:420};
const YRS=[2026,2027,2028,2029,2030];
const SYR=[2027,2028,2029,2030,2031,2032,2033];
const YC=["#1499ff","#00d8ff","#00f090","#ffd060","#ff9030"];

function App(){
  const [dk,setDk]=useState("support");
  const [clGrade,setClGrade]=useState("cl3"); // CL 등급 (샐러리캡 기준)
  const [base,setBase]=useState(10000);
  const [baseGr,setBaseGr]=useState(4.1);  // 기준 인상률 (Base-up)
  const [perfGr,setPerfGr]=useState(2.1);  // 성과 인상률
  const [salGr,setSalGr]=useState(6.2);    // 합산 인상률 (baseGr+perfGr)
  const [sal,setSal]=useState(Object.fromEntries(YRS.map((y,i)=>[y,Math.round(10000*1.062**i)])));
  const [ds,setDs]=useState({...CONS});
  const [stkNow,setStkNow]=useState(322500);
  const [psuF,setPsuF]=useState(322500);
  const [psuCl,setPsuCl]=useState("cl3"); // CL 선택
  const [tab,setTab]=useState("c");
  const [spx,setSpx]=useState(Object.fromEntries(SYR.map(y=>[y,322500])));
  const [agr,setAgr]=useState(0);
  const [aptGr,setAptGr]=useState(3);
  const [stkGr,setStkGr]=useState(10);
  const [cash,setCash]=useState(5);
  const [loan,setLoan]=useState(5);
  const [loanRate,setLoanRate]=useState(3.8);
  const [loanYears,setLoanYears]=useState(30);
  const [region,setRegion]=useState({l:"조정대상지역",ltv:50,dsr:40});

  const CAP=SAL_CAP['cl4']*10000; // 부장 샐러리캡만 절대 상한 (13,000만원)
  const totalGr=baseGr+perfGr;
  const hBase=v=>{
    const capped=Math.min(v,SAL_CAP['cl4']); // 기준연봉도 부장캡 이하로
    setBase(capped);
    setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(capped*((1+totalGr/100)**i)),SAL_CAP['cl4'])])));
  };
  const hGr=(bg,pg)=>{const tg=bg+pg;setSalGr(tg);setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(base*((1+tg/100)**i)),SAL_CAP['cl4'])])));};
  const hSalGr=r=>{setSalGr(r);setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(base*((1+r/100)**i)),SAL_CAP['cl4'])])));};
  const setSalCapped=(yr,v)=>setSal(p=>({...p,[yr]:Math.min(v,SAL_CAP['cl4'])})); // 부장캡 초과 방지
  const applyGr=r=>setSpx(Object.fromEntries(SYR.map((y,i)=>[y,Math.round(stkNow*((1+r/100)**(i+1)))])));

  const yd=useMemo(()=>YRS.map(y=>calcYr(dk,sal[y]*10000,ds[y],y)),[dk,sal,ds]);
  const cum=useMemo(()=>yd.reduce((s,r)=>({g:s.g+r.tg,t:s.t+r.tt,n:s.n+r.tn,oi:s.oi+r.on,sp:s.sp+r.sn}),{g:0,t:0,n:0,oi:0,sp:0}),[yd]);

  const pPct=Math.round((psuF-PSU_BASE)/PSU_BASE*100);
  const PSU_SH=PSU_CL[psuCl].sh; // CL별 약정주수
  const pM=psuM(pPct),pTot=Math.round(PSU_SH*pM),pYr=Math.round(pTot/3),pYW=pYr*psuF;
  const pt28=mTax((sal[2028]||0)*10000+(yd.find(r=>r.yr===2028)?.tg||0),pYW);
  const pt29=mTax((sal[2029]||0)*10000+(yd.find(r=>r.yr===2029)?.tg||0),pYW);
  const pt30=mTax((sal[2030]||0)*10000+(yd.find(r=>r.yr===2030)?.tg||0),pYW);
  const pNA=[pYW-pt28,pYW-pt29,pYW-pt30];
  const pNet=pM>0?pNA.reduce((s,v)=>s+v,0):0;

  const mxB=Math.max(...yd.map(r=>r.tg),1);
  const smMap=useMemo(()=>{
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      [[py,s1],[py+1,s2],[py+2,s3]].forEach(([y,sh])=>{m[y]=(m[y]||0)+sh*(spx[y]||stkNow);});});
    return m;
  },[yd,stkNow,spx]);
  const smE=Object.entries(smMap).sort((a,b)=>+a[0]-+b[0]);
  const smTot=Object.values(smMap).reduce((s,v)=>s+v,0);
  const spTotN=yd.reduce((s,r)=>s+r.sn,0);

  // 부동산
  const sAt=y=>Math.round(stkNow*(1+stkGr/100)**(y-2026));
  const aAt=(p,y)=>Math.round(p*(1+aptGr/100)**(y-2026));
  const aptYrs=[2027,2028,2029,2030,2031,2032,2033];
  const cbY=useMemo(()=>{
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      m[py]=(m[py]||0)+r.on+s1*sAt(py);m[py+1]=(m[py+1]||0)+s2*sAt(py+1);m[py+2]=(m[py+2]||0)+s3*sAt(py+2);});
    [[2028,pNA[0]],[2029,pNA[1]],[2030,pNA[2]]].forEach(([y,v])=>{m[y]=(m[y]||0)+(pM>0?v:0);});
    let run=0;const cum={};aptYrs.forEach(y=>{run+=(m[y]||0);cum[y]=run;});
    return {cash:m,cum};
  },[yd,stkNow,stkGr,pNA,pM,aptGr]);
  const fcum=cbY.cum[2033]||0;
  const mxC=Math.max(...aptYrs.map(y=>cbY.cash[y]||0),1);

  const TABS=[["c","📊 5년 누적"],["l","🔒 자사주"],["p","📈 PSU"],["a","🏠 부동산"]];

  return(
    <div id="sim-root" style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg},#0b1726)`,fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",color:C.text}}>
      <SliderStyle/>
      {/* 헤더 */}
      <div style={{borderBottom:`1px solid rgba(20,153,255,0.18)`,padding:"11px 14px",display:"flex",alignItems:"center",gap:10,background:"rgba(0,0,0,0.28)"}}>
        <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#1499ff,#0044bb)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff"}}>S</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700}}>삼성전자 보상 시뮬레이터</div>
          <div style={{fontSize:9,color:C.muted}}>OPI·특별성과급·PSU·2026 노사합의·CL3</div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {TABS.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 9px",borderRadius:14,fontSize:10,fontWeight:600,cursor:"pointer",
              border:tab===k?`1.5px solid ${C.blue}`:`1px solid ${C.bd}`,
              background:tab===k?"rgba(20,153,255,0.15)":"rgba(255,255,255,0.04)",color:tab===k?C.blue:C.muted}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"14px 12px"}}>

      {/* ══ 5년 누적 ══ */}
      {tab==="c"&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <Card>
            <Label>소속 사업부</Label>
            {Object.entries(DIV).map(([k,d])=>(
              <button key={k} onClick={()=>setDk(k)} style={{display:"flex",justifyContent:"space-between",width:"100%",padding:"7px 10px",borderRadius:8,marginBottom:5,cursor:"pointer",
                border:dk===k?`2px solid ${C.blue}`:`1px solid ${C.bd}`,background:dk===k?"rgba(20,153,255,0.13)":"rgba(255,255,255,0.03)",
                color:dk===k?C.text:C.sub,fontWeight:dk===k?700:400,fontSize:11}}>
                <span>{{memory:"메모리",lsi:"시스템LSI",foundry:"파운드리",support:"지원·공통"}[k]}</span>
                <span style={{fontSize:9,color:dk===k?C.blue:C.muted}}>{dk===k?"✓":d.d?"적자":""}</span>
              </button>
            ))}
          </Card>
          <Card>
            <Label>기준 연봉 (2026, 세전)</Label>
            {/* CL 선택 - 참고용 (부장캡 1.3억이 절대 상한) */}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:5}}>현재 직급 (참고용 · 부장 샐러리캡 1.3억 절대 상한)</div>
              <div style={{display:"flex",gap:5}}>
                {Object.entries({cl2:"CL1~2",cl3:"CL3 (과장)",cl4:"CL4 (부장)"}).map(([k,l])=>(
                  <button key={k} onClick={()=>{setClGrade(k);}} style={{
                    flex:1,padding:"5px 0",borderRadius:8,fontSize:9,fontWeight:700,cursor:"pointer",
                    border:clGrade===k?`1.5px solid ${C.blue}`:`1px solid ${C.bd}`,
                    background:clGrade===k?"rgba(20,153,255,0.12)":"rgba(255,255,255,0.03)",
                    color:clGrade===k?C.blue:C.muted}}>
                    {l}<br/>
                    <span style={{fontSize:8,color:clGrade===k?C.cyan:C.muted}}>
                      현재캡 {(SAL_CAP[k]/10000).toFixed(1)}억
                      {k==='cl4'&&<span style={{color:C.red}}> 🔒</span>}
                    </span>
                  </button>
                ))}
              </div>
              <div style={{fontSize:8,color:C.muted,marginTop:4}}>
                💡 진급 예상 시 연봉을 자유롭게 입력 가능 · 단, 부장 샐러리캡(1.3억) 초과는 불가
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <input type="number" min={4000} max={SAL_CAP[clGrade]} step={500} value={base} onChange={e=>hBase(+e.target.value)}
                style={{background:"rgba(255,255,255,0.07)",border:`1px solid ${C.bd}`,borderRadius:8,color:C.yellow,fontSize:20,fontWeight:800,padding:"8px 10px",width:130,textAlign:"right"}}/>
              <div style={{fontSize:12,color:C.muted}}>만원<br/>
                <span style={{color:base>=SAL_CAP[clGrade]?C.red:C.yellow,fontWeight:700}}>
                  {base>=SAL_CAP[clGrade]?"⚠️ 샐러리캡":((base/10000).toFixed(2)+"억")}
                </span>
              </div>
            </div>
            <input type="range" min={4000} max={SAL_CAP[clGrade]} step={500} value={base} onChange={e=>hBase(+e.target.value)} style={{width:"100%",accentColor:C.yellow,height:4,cursor:"pointer",marginBottom:8}}/>
            {/* 기준 + 성과 인상률 */}
            <div style={{background:"rgba(255,208,60,0.07)",border:"1px solid rgba(255,208,60,0.2)",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:9,color:C.yellow,fontWeight:700,marginBottom:6}}>

              </div>
            );})}
          </Card>

          <Card style={{marginBottom:12}}>
            <Label>📅 연도별 매입 가능 지역 (2027~2033)</Label>
            <div style={{fontSize:9,color:C.muted,marginBottom:10,padding:"5px 8px",borderRadius:6,background:"rgba(0,216,255,0.06)",border:"1px solid rgba(0,216,255,0.14)"}}>
              매입 기준 = 현금({cash}억) + LTV/DSR 대출 한도 + 성과급 누적 ≥ 해당 연도 아파트 시세
            </div>
            {aptYrs.map(y=>{
              // LTV/DSR 대출 한도 계산 (각 아파트 가격 기준)
              const annualSal=(sal[2026]||base)*10000;
              const opi2026=yd.find(r=>r.yr===2026)?.on||0;
              const opi2027=yd.find(r=>r.yr===2027)?.on||0;
              const opiRecog2=Math.round((opi2026+opi2027)/2*0.5);
              const dsrIncome2=annualSal+opiRecog2;
              const r2=loanRate/100/12,n2=loanYears*12;
              const maxM=Math.round(dsrIncome2*region.dsr/100/12);
              const dsrL=r2>0?Math.round(maxM*(Math.pow(1+r2,n2)-1)/(r2*Math.pow(1+r2,n2))):maxM*n2;
              const getLoan=p=>Math.min(Math.round(p*region.ltv/100),dsrL);
              // 성과급 누적 포함 총 자금 (아파트별로 LTV가 다르므로 각각 계산)
              const cumBon=cbY.cum[y]||0;
              const ok=APTS.filter(a=>{const futP=aptAt(a.p,y);return cash*1e8+getLoan(futP)+cumBon>=futP;});
              const no=APTS.filter(a=>{const futP=aptAt(a.p,y);return cash*1e8+getLoan(futP)+cumBon<futP;}).map(a=>{const futP=aptAt(a.p,y);return{...a,gap:futP-(cash*1e8+getLoan(futP)+cumBon)};}).sort((a,b)=>a.gap-b.gap);
              const bf=cash*1e8+getLoan(13e8)+cumBon; // 총 자금 표시용
              return(
                <div key={y} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${ok.length>0?"rgba(0,240,144,0.22)":C.bd}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ok.length>0?8:0}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:800,color:ok.length>0?C.green:C.muted}}>{y}년</span>
                      <span style={{fontSize:9,color:C.muted,marginLeft:8}}>총 자금 <strong style={{color:C.cyan}}>{fw(bf)}</strong></span>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:ok.length>0?C.green:C.muted}}>{ok.length>0?`✅ ${ok.length}개`:"❌ 해당없음"}</span>
                  </div>
                  {ok.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:no.length>0?8:0}}>
                    {ok.map(a=><a key={a.a} href={a.url} target="_blank" rel="noopener noreferrer"
                      style={{background:"rgba(0,240,144,0.09)",border:"1px solid rgba(0,240,144,0.28)",
                        borderRadius:7,padding:"4px 9px",fontSize:10,textDecoration:"none",display:"block",cursor:"pointer"}}>
                      <span style={{color:a.col,fontWeight:700}}>{a.e} {a.a}</span>
                      <span style={{color:C.muted,fontSize:9,marginLeft:4}}>{fw(aptAt(a.p,y))}</span>
                      <div style={{fontSize:8,color:C.cyan,marginTop:1}}>📎 {a.apt} →</div>
                    </a>)}
                  </div>}
                  {no.length>0&&<div>
                    <div style={{fontSize:9,color:C.muted,marginBottom:4}}>📍 부족 (가까운 순)</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {no.slice(0,4).map(a=><a key={a.a} href={a.url} target="_blank" rel="noopener noreferrer"
                        style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${C.bd}`,borderRadius:7,padding:"3px 8px",fontSize:9,textDecoration:"none",display:"block"}}>
                        <span style={{color:a.col}}>{a.a}</span>
                        <span style={{color:C.red,marginLeft:3}}>-{fw(a.gap)}</span>
                        <div style={{fontSize:7,color:C.muted,marginTop:1}}>{a.apt}</div>
                      </a>)}
                    </div>
                  </div>}
                </div>
              );
            })}
          </Card>
          <div style={{fontSize:9,color:"#4e6880",lineHeight:1.7,padding:"7px 10px",borderRadius:8,background:"rgba(255,200,50,0.04)",border:"1px solid rgba(255,200,50,0.12)"}}>
            ⚠️ 시세 2026.06 기준 84㎡ 추정치 · 취득세·중개수수료 미포함 · 대출 DSR·LTV 규제 별도
          </div>
        </>);
      })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
