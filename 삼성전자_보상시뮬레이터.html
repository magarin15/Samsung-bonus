<script type="text/babel">
const { useState, useMemo } = React;


// ── 세금 ──
const TB=[{l:14e6,r:.066},{l:50e6,r:.165},{l:88e6,r:.264},{l:150e6,r:.385},{l:300e6,r:.418},{l:500e6,r:.451},{l:Infinity,r:.495}];
const tax=i=>{if(i<=0)return 0;let t=0,p=0;for(const b of TB){if(i<=p)break;t+=(Math.min(i,b.l)-p)*b.r;p=b.l;}return Math.round(t);};
const mTax=(base,add)=>tax(base+add)-tax(base);

// ── OPI1 ──
const OPI1=[{max:0,r:0},{max:10,r:0},{max:20,r:14},{max:35,r:30},{max:50,r:40},{max:70,r:47},{max:999,r:50}];
const opiR=ds=>{for(const o of OPI1)if(ds<=o.max)return o.r;return 50;};

// ── OPI2 ──
const DS_HC=79000;
const DIV_INFO={memory:{hc:27000,pw:.90,d:false},lsi:{hc:11500,pw:.04,d:true},foundry:{hc:11500,pw:.06,d:true},support:{hc:29000,pw:null,d:false}};
const calcSP=(k,w,yr)=>{
  if(k==='support')return Math.round(calcSP('memory',w,yr)*.70);
  const d=DIV_INFO[k],pool=w*.105,cph=(pool*.40)/DS_HC;
  if(d.d)return yr>=2027?Math.round(cph*.6):Math.round(cph);
  return Math.round(cph+(pool*.60*d.pw)/d.hc);
};

// ── OPI2 지급 조건 (DS 영업이익 기준, 합의문) ──
// 2026~2028: DS 200조 달성 시 지급, 2029~2035: DS 100조 달성 시 지급
const PSU_BASE=85385;
const PSU_CL={
  cl2:{label:"CL1~2 (사원·대리)",sh:200},
  cl3:{label:"CL3~4 (과장·부장)",sh:300},
};
const PSU_M=[{a:0,b:20,m:0},{a:20,b:40,m:.5},{a:40,b:60,m:1},{a:60,b:80,m:1.3},{a:80,b:100,m:1.7},{a:100,b:999,m:2}];
const psuM=p=>{for(const r of PSU_M)if(p>=r.a&&p<r.b)return r.m;return 2;};

// ── 포맷 ──
const fw=v=>{const a=Math.abs(v);if(a>=1e8)return`${(v/1e8).toFixed(2)}억원`;if(a>=1e4)return`${Math.round(v/1e4).toLocaleString()}만원`;return`${Math.round(v)}원`;};
const fs2=v=>v>=1e8?`${(v/1e8).toFixed(1)}억`:v>=1e4?`${Math.round(v/1e4)}만`:`${Math.round(v)}`;

// ── 색상 ──
const C={bg:"#06101d",bd:"rgba(255,255,255,0.09)",blue:"#1499ff",cyan:"#00d8ff",green:"#00f090",yellow:"#ffd060",red:"#ff5050",purple:"#b060ff",orange:"#ff9030",muted:"#4e6880",sub:"#8aaabb",text:"#ddeeff"};

// 슬라이더 스타일 전역 주입
const SliderStyle=()=>(
  <style>{`
    input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:rgba(255,255,255,0.2);outline:none;cursor:pointer;width:100%;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;box-shadow:0 0 6px rgba(20,153,255,0.7);}
    input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;box-shadow:0 0 6px rgba(20,153,255,0.7);}
    input[type=range]::-ms-thumb{width:18px;height:18px;border-radius:50%;background:#1499ff;border:2px solid #fff;cursor:pointer;}
    input[type=number]{-moz-appearance:textfield;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  `}</style>
);
const Card=({children,ac,style={}})=>{
  const bg=ac==='green'?"rgba(0,240,144,0.07)":ac==='purple'?"rgba(176,96,255,0.08)":"rgba(255,255,255,0.04)";
  const bd=ac==='green'?"rgba(0,240,144,0.35)":ac==='purple'?"rgba(176,96,255,0.35)":C.bd;
  return <div style={{background:bg,border:`1px solid ${bd}`,borderRadius:12,padding:"14px 16px",...style}}>{children}</div>;
};
const Label=({c,children})=><div style={{fontSize:10,color:c||C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>{children}</div>;

// ── 연도별 계산 ──
const calcYr=(dk,sal,ds,yr)=>{
  const og=Math.round(sal*opiR(ds)/100);
  const threshold=SP_THRESHOLD(yr);
  const sg=ds>=threshold?calcSP(dk,ds*1e12,yr):0;
  const tg=og+sg;
  const ot=mTax(sal,og),st=mTax(sal+og,sg);
  return {yr,og,sg,tg,ot,st,tt:ot+st,on:og-ot,sn:sg-st,tn:tg-ot-st,
    spMet:ds>=threshold,threshold};
};

// ── 아파트 ──
const APTS=[
  {a:"강남구",  c:"서울",p:26e8,col:"#ff5050",e:"🏆",apt:"래미안대치팰리스",  url:"https://map.naver.com/v5/search/래미안대치팰리스"},
  {a:"서초구",  c:"서울",p:22e8,col:"#ff7030",e:"🏆",apt:"아크로리버파크",    url:"https://map.naver.com/v5/search/아크로리버파크"},
  {a:"송파구",  c:"서울",p:19e8,col:"#ff9030",e:"⭐",apt:"헬리오시티",        url:"https://map.naver.com/v5/search/헬리오시티"},
  {a:"마포·용산",c:"서울",p:17e8,col:"#ffd060",e:"⭐",apt:"마포래미안푸르지오",url:"https://map.naver.com/v5/search/마포래미안푸르지오"},
  {a:"성동·광진",c:"서울",p:15e8,col:"#c8d060",e:"⭐",apt:"왕십리센트라스",   url:"https://map.naver.com/v5/search/왕십리센트라스"},
  {a:"노원구",  c:"서울",p:13e8,col:"#00d8ff",e:"✅",apt:"상계주공16단지",    url:"https://map.naver.com/v5/search/상계주공16단지"},
  {a:"강서·양천",c:"서울",p:11e8,col:"#00d8ff",e:"✅",apt:"목동신시가지14단지",url:"https://map.naver.com/v5/search/목동신시가지14단지"},
  {a:"분당·판교",c:"경기",p:14e8,col:"#00f090",e:"✅",apt:"판교알파리움1단지", url:"https://map.naver.com/v5/search/판교알파리움1단지"},
  {a:"광교·수원",c:"경기",p:9e8, col:"#4dff90",e:"✅",apt:"광교중흥S클래스",   url:"https://map.naver.com/v5/search/광교중흥S클래스"},
  {a:"용인·기흥",c:"경기",p:75e7,col:"#80ffa0",e:"✅",apt:"힐스테이트기흥",   url:"https://map.naver.com/v5/search/힐스테이트기흥"},
  {a:"인천 연수",c:"인천",p:65e7,col:"#b060ff",e:"✅",apt:"송도더샵퍼스트월드",url:"https://map.naver.com/v5/search/송도더샵퍼스트월드"},
  {a:"인천 계양",c:"인천",p:5e8, col:"#c080ff",e:"✅",apt:"힐스테이트자이계양",url:"https://map.naver.com/v5/search/힐스테이트자이계양"},
  {a:"김포·파주",c:"경기",p:45e7,col:"#8aaabb",e:"✅",apt:"한강메트로자이",    url:"https://map.naver.com/v5/search/한강메트로자이"},
];

// ── OPI2 지급 조건 (DS 영업이익 기준, 합의문) ──
// 2026~2028: DS 200조 달성 시 지급, 2029~2035: 100조 달성 시 지급
const SP_THRESHOLD=(yr)=>yr<=2028?200:100;

// ── CL별 샐러리캡 (2026 합의, 만원 기준) ──
const SAL_CAP={cl2:8000,cl3:11000,cl4:13000};
const CL_BY_DIV={memory:"cl3",lsi:"cl3",foundry:"cl3",support:"cl3"};

// ── DS 영업이익 시나리오 ──
const SCENARIOS={
  bull2:{label:"🚀🚀 슈퍼낙관", desc:"AI 수요 폭발, 메모리 슈퍼사이클",   ds:{2026:500,2027:600,2028:700,2029:600,2030:500}},
  bull: {label:"🚀 낙관",       desc:"GS 상단, AI 수요 강세",             ds:{2026:400,2027:500,2028:600,2029:550,2030:480}},
  base: {label:"📊 기본",       desc:"KB·미래에셋·GS·DB 컨센서스 평균",   ds:{2026:360,2027:440,2028:550,2029:480,2030:420}},
  bear: {label:"🐻 비관",       desc:"반도체 사이클 둔화, 공급 과잉",      ds:{2026:280,2027:320,2028:380,2029:300,2030:250}},
  bear2:{label:"🐻🐻 최악",     desc:"글로벌 경기침체, 수요 급감",         ds:{2026:180,2027:200,2028:240,2029:200,2030:180}},
};


// 5단계 시나리오 색상
const dsColor=k=>k==="bull2"?"#00ff88":k==="bull"?"#00f090":k==="bear"?"#ff9030":k==="bear2"?"#ff5050":"#00d8ff";
const stkColor=k=>k==="bull2"?"#00ff88":k==="bull"?"#00f090":k==="bear"?"#ff9030":k==="bear2"?"#ff5050":"#00d8ff";
const CONS={2026:360,2027:440,2028:550,2029:480,2030:420};
const YRS=[2026,2027,2028,2029,2030];
const SYR=[2027,2028,2029,2030,2031,2032,2033];
const YC=["#1499ff","#00d8ff","#00f090","#ffd060","#ff9030"];

function App(){
  const [dk,setDk]=useState("support");
  const [clGrade,setClGrade]=useState("cl3"); // CL 등급 (샐러리캡 기준)
  const [base,setBase]=useState(10000);
  const [baseGr,setBaseGr]=useState(4.1);  // 기준 인상률 (Base-up)
  const [perfGr,setPerfGr]=useState(2.1);  // 성과 인상률
  const [salGr,setSalGr]=useState(6.2);    // 합산 인상률 (baseGr+perfGr)
  const [sal,setSal]=useState(Object.fromEntries(YRS.map((y,i)=>[y,Math.round(10000*1.062**i)])));
  const [ds,setDs]=useState({...CONS});
  const [scenario,setScenario]=useState("base");
  const [stkNow,setStkNow]=useState(322500);
  const [psuCl,setPsuCl]=useState("cl3");
  // PSU 예상 주가: 자사주 탭 주가 상승률(agr) 연동 — 2026→2028 2년 복리
  // agr state는 자사주 탭에서 설정됨
  const [tab,setTab]=useState("set");
  const [spx,setSpx]=useState(Object.fromEntries(SYR.map(y=>[y,322500])));
  const [agr,setAgr]=useState(0);
  const [aptGr,setAptGr]=useState(3);
  const [stkGr,setStkGr]=useState(10);
  const [aptStkGr,setAptStkGr]=useState(null);
  const [salDs,setSalDs]=useState("base");   // 실수령탭 영업이익 시나리오
  const [salStk,setSalStk]=useState("base"); // 실수령탭 주가 시나리오
  const [cash,setCash]=useState(5);
  const [loan,setLoan]=useState(5);
  const [loanRate,setLoanRate]=useState(3.8);
  const [loanYears,setLoanYears]=useState(30);
  const [region,setRegion]=useState({l:"조정대상지역",ltv:50,dsr:40});

  const CAP=SAL_CAP['cl4']*10000; // 부장 샐러리캡만 절대 상한 (13,000만원)
  const totalGr=baseGr+perfGr;
  const hBase=v=>{
    const capped=Math.min(v,SAL_CAP['cl4']); // 기준연봉도 부장캡 이하로
    setBase(capped);
    setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(capped*((1+totalGr/100)**i)),SAL_CAP['cl4'])])));
  };
  const hGr=(bg,pg)=>{const tg=bg+pg;setSalGr(tg);setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(base*((1+tg/100)**i)),SAL_CAP['cl4'])])));};
  const hSalGr=r=>{setSalGr(r);setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.min(Math.round(base*((1+r/100)**i)),SAL_CAP['cl4'])])));};
  const setSalCapped=(yr,v)=>setSal(p=>({...p,[yr]:Math.min(v,SAL_CAP['cl4'])})); // 부장캡 초과 방지
  const applyGr=r=>setSpx(Object.fromEntries(SYR.map((y,i)=>[y,Math.round(stkNow*((1+r/100)**(i+1)))])));

  const yd=useMemo(()=>YRS.map(y=>calcYr(dk,sal[y]*10000,ds[y],y)),[dk,sal,ds]);
  const cum=useMemo(()=>yd.reduce((s,r)=>({g:s.g+r.tg,t:s.t+r.tt,n:s.n+r.tn,oi:s.oi+r.on,sp:s.sp+r.sn}),{g:0,t:0,n:0,oi:0,sp:0}),[yd]);

  const psuF=Math.round(stkNow*(1+agr/100)**2); // 자사주 탭 상승률 2년 복리 자동연동
  const pPct=Math.round((psuF-PSU_BASE)/PSU_BASE*100);
  const PSU_SH=PSU_CL[psuCl].sh; // CL별 약정주수
  const pM=psuM(pPct),pTot=Math.round(PSU_SH*pM),pYr=Math.round(pTot/3),pYW=pYr*psuF;
  const pt28=mTax((sal[2028]||0)*10000+(yd.find(r=>r.yr===2028)?.tg||0),pYW);
  const pt29=mTax((sal[2029]||0)*10000+(yd.find(r=>r.yr===2029)?.tg||0),pYW);
  const pt30=mTax((sal[2030]||0)*10000+(yd.find(r=>r.yr===2030)?.tg||0),pYW);
  const pNA=[pYW-pt28,pYW-pt29,pYW-pt30];
  const pNet=pM>0?pNA.reduce((s,v)=>s+v,0):0;

  const mxB=Math.max(...yd.map(r=>r.tg),1);
  const smMap=useMemo(()=>{
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      [[py,s1],[py+1,s2],[py+2,s3]].forEach(([y,sh])=>{m[y]=(m[y]||0)+sh*(spx[y]||stkNow);});});
    return m;
  },[yd,stkNow,spx]);
  const smE=Object.entries(smMap).sort((a,b)=>+a[0]-+b[0]);
  const smTot=Object.values(smMap).reduce((s,v)=>s+v,0);
  const spTotN=yd.reduce((s,r)=>s+r.sn,0);

  // 부동산
  const sAt=y=>Math.round(stkNow*(1+stkGr/100)**(y-2026));
  const aAt=(p,y)=>Math.round(p*(1+aptGr/100)**(y-2026));
  const aptYrs=[2027,2028,2029,2030,2031,2032,2033];
  const cbY=useMemo(()=>{ // 기본값 (부동산탭 밖에서도 필요할 경우 대비)
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      const sAtDef=y=>Math.round(stkNow*(1+agr/100)**(y-2026));
      m[py]=(m[py]||0)+r.on+s1*sAtDef(py);m[py+1]=(m[py+1]||0)+s2*sAtDef(py+1);m[py+2]=(m[py+2]||0)+s3*sAtDef(py+2);});
    [[2028,pNA[0]],[2029,pNA[1]],[2030,pNA[2]]].forEach(([y,v])=>{m[y]=(m[y]||0)+(pM>0?v:0);});
    let run=0;const cum={};aptYrs.forEach(y=>{run+=(m[y]||0);cum[y]=run;});
    return {cash:m,cum};
  },[yd,stkNow,agr,pNA,pM]);
  const fcum=cbY.cum[2033]||0;
  const mxC=Math.max(...aptYrs.map(y=>cbY.cash[y]||0),1);

  const TABS=[["set","⚙️ 설정"],["c","📊 성과금"],["l","🔒 자사주"],["p","📈 PSU"],["mx","🔀 비교"],["tax","💰 절세"],["sal","💵 실수령"],["a","🏠 부동산"]];

  // ── 시나리오 매트릭스 계산 ──
  const STK_SCENARIOS={
    bull2:{label:"🚀🚀 슈퍼낙관", gr:20},
    bull: {label:"🚀 낙관",       gr:12},
    base: {label:"📊 기본",       gr:8},
    bear: {label:"🐻 비관",       gr:0},
    bear2:{label:"🐻🐻 최악",     gr:-10},
  };
  const DS_KEYS=["bull2","bull","base","bear","bear2"];
  const STK_KEYS=["bull2","bull","base","bear","bear2"];

  const calcMatrix=()=>{
    const matrix={};
    DS_KEYS.forEach(dk2=>{
      matrix[dk2]={};
      STK_KEYS.forEach(sk=>{
        const dsSc=SCENARIOS[dk2].ds;
        const stkGr2=STK_SCENARIOS[sk].gr;
        // 연도별 계산
        const ydM=YRS.map(y=>calcYr(dk,sal[y]*10000,dsSc[y],y));
        // 5년 성과급 세후 합계
        const opiNet=ydM.reduce((s,r)=>s+r.on,0);
        const spNet=ydM.reduce((s,r)=>s+r.sn,0);
        // 자사주 매도 (주가 상승률 반영)
        const stkAt=y=>Math.round(stkNow*(1+stkGr2/100)**(y-2026));
        let stockSell=0;
        ydM.forEach(r=>{
          const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
          stockSell+=s1*stkAt(py)+s2*stkAt(py+1)+s3*stkAt(py+2);
        });
        // PSU — 2028.10 평가주가로 이익금 확정, 3년 분할 수령하지만 금액은 모두 2028 주가 기준
        const psuF2=Math.round(stkNow*(1+stkGr2/100)**2); // 2028.10 평가주가
        const pPct2=Math.round((psuF2-PSU_BASE)/PSU_BASE*100);
        const pM2=psuM(pPct2);
        const PSU_SH2=PSU_CL[psuCl].sh;
        const pTot2=Math.round(PSU_SH2*pM2);
        const pYr2=Math.round(pTot2/3);
        const pW=pYr2*psuF2; // 연간 수령액 (2028 주가 고정)
        const pt28_2=mTax((sal[2028]||0)*10000+(ydM.find(r=>r.yr===2028)?.tg||0),pW);
        const pt29_2=mTax((sal[2029]||0)*10000+(ydM.find(r=>r.yr===2029)?.tg||0),pW);
        const pt30_2=mTax((sal[2030]||0)*10000+(ydM.find(r=>r.yr===2030)?.tg||0),pW);
        const psuNet=pM2>0?((pW-pt28_2)+(pW-pt29_2)+(pW-pt30_2)):0;
        // 총합
        const total=opiNet+stockSell+psuNet;
        matrix[dk2][sk]={opiNet,spNet,stockSell,psuNet,total};
      });
    });
    return matrix;
  };

                        <div style={{flex:1}}>
                          <div style={{height:16,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${bw}%`,background:item.c,
                              opacity:dk2==="bull2"?1:dk2==="bull"?0.85:dk2==="bear"?0.45:dk2==="bear2"?0.25:0.65,
                              borderRadius:4}}/>
                          </div>
                        </div>
                        <div style={{fontSize:9,color:dc,fontWeight:700,width:52,textAlign:"right",flexShrink:0}}>{fs2(v)}</div>
                      </div>
                    );
                  })}
                  <div style={{fontSize:8,color:C.muted,marginTop:2,borderTop:`1px solid ${C.bd}`,paddingTop:4}}>
                    막대: 주가 기본(+8%) 기준
                  </div>
                </div>
              );
            })}
            {/* PSU: 주가별 (DS 무관) */}
            {(()=>{
              const psuVals=STK_KEYS.map(sk=>matrix["base"][sk].psuNet);
              const maxV=Math.max(...psuVals,1);
              return(
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontSize:10,color:C.purple,fontWeight:700}}>PSU (세후)</div>
                    <div style={{fontSize:8,color:C.muted}}>주가에만 연동 · DS 영업이익 무관</div>
                  </div>
                  {STK_KEYS.map(sk=>{
                    const v=matrix["base"][sk].psuNet;
                    const bw=Math.round(v/maxV*100);
                    const sc=stkColor(sk);
                    const lbl=sk==="bull2"?"🚀🚀":sk==="bull"?"🚀":sk==="bear"?"🐻":sk==="bear2"?"🐻🐻":"📊";
                    const lblFull=sk==="bull2"?"슈퍼낙관":sk==="bull"?"낙관":sk==="bear"?"비관":sk==="bear2"?"최악":"기본";
                    return(
                      <div key={sk} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                        <div style={{fontSize:9,color:sc,width:62,flexShrink:0,fontWeight:600}}>{lbl} {lblFull}</div>
                        <div style={{flex:1}}>
                          <div style={{height:16,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${bw}%`,background:C.purple,
                              opacity:sk==="bull2"?1:sk==="bull"?0.85:sk==="bear"?0.45:sk==="bear2"?0.25:0.65,
                              borderRadius:4}}/>
                          </div>
                        </div>
                        <div style={{fontSize:9,color:sc,fontWeight:700,width:52,textAlign:"right",flexShrink:0}}>{fs2(v)}</div>
                      </div>
                    );
                  })}
                  <div style={{fontSize:8,color:C.muted,marginTop:2,borderTop:`1px solid ${C.bd}`,paddingTop:4}}>
                    막대: 영업이익 기본 시나리오 기준 · 2028.10 평가주가로 금액 확정
                  </div>
                </div>
              );
            })()}
          </Card>

          <div style={{fontSize:9,color:"#4e6880",lineHeight:1.7,padding:"7px 10px",borderRadius:8,background:"rgba(255,200,50,0.04)",border:"1px solid rgba(255,200,50,0.12)"}}>
            ⚠️ OPI1은 DS 영업이익만 반영 · 자사주는 5년간 락업 해제 후 매도 기준 · PSU는 현재 설정 배수 적용 · 세금 누진 적용(공제 전)
          </div>
        </>);
      })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
