<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>삼성전자 보상 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #06101d; font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; color: #ddeeff; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.12); outline: none; cursor: pointer; width: 100%; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  table { border-collapse: collapse; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── 누진세 ──
const TAX_BRACKETS = [
  {limit:14000000,rate:0.066},{limit:50000000,rate:0.165},
  {limit:88000000,rate:0.264},{limit:150000000,rate:0.385},
  {limit:300000000,rate:0.418},{limit:500000000,rate:0.451},
  {limit:Infinity,rate:0.495},
];
function calcTax(income) {
  if(income<=0)return 0;
  let tax=0,prev=0;
  for(const b of TAX_BRACKETS){
    if(income<=prev)break;
    tax+=(Math.min(income,b.limit)-prev)*b.rate;
    prev=b.limit;
  }
  return Math.round(tax);
}
function marginalTax(base,add){return calcTax(base+add)-calcTax(base);}

// ── OPI 지급률 ──
const OPI_TABLE=[
  {max:0,rate:0,desc:"적자 (0%)"},{max:10,rate:0,desc:"소폭흑자 (0%)"},
  {max:20,rate:14,desc:"회복기 (14%)"},{max:35,rate:30,desc:"성장기 (30%)"},
  {max:50,rate:40,desc:"호황 (40%)"},{max:70,rate:47,desc:"강호황 (47%)"},
  {max:999,rate:50,desc:"슈퍼사이클 (50%)"},
];
function getOpiInfo(dsJo){
  for(const r of OPI_TABLE){if(dsJo<=r.max)return r;}
  return OPI_TABLE[OPI_TABLE.length-1];
}

// ── 특별경영성과급 ──
const SP_RATE=0.105,SP_CMN=0.40,SP_DIV=0.60,SP_SUP=0.70,DS_HC_3=74000;
const DIV_INFO={
  memory:{label:"메모리사업부",hc:42000,perfW:0.90,deficit26:false,deficit27:false},
  lsi:{label:"시스템LSI사업부",hc:14000,perfW:0.06,deficit26:true,deficit27:true},
  foundry:{label:"파운드리사업부",hc:18000,perfW:0.04,deficit26:true,deficit27:true},
  support:{label:"지원·공통조직",hc:8000,perfW:null,deficit26:false,deficit27:false},
};
function calcSpecial(divKey,dsOpWon,yr){
  if(divKey==="support")return Math.round(calcSpecial("memory",dsOpWon,yr)*SP_SUP);
  const d=DIV_INFO[divKey];
  const pool=dsOpWon*SP_RATE;
  const cPH=(pool*SP_CMN)/DS_HC_3;
  const isDeficit=yr>=2027?d.deficit27:d.deficit26;
  if(isDeficit)return yr>=2027?Math.round(cPH*0.6):Math.round(cPH);
  return Math.round(cPH+(pool*SP_DIV*d.perfW)/d.hc);
}

// ── PSU ──
const PSU_BASE=85385,PSU_SH=300;
const PSU_MULT_TABLE=[
  {min:0,max:20,m:0},{min:20,max:40,m:0.5},{min:40,max:60,m:1},
  {min:60,max:80,m:1.3},{min:80,max:100,m:1.7},{min:100,max:999,m:2},
];
function getPsuMult(pct){
  for(const r of PSU_MULT_TABLE){if(pct>=r.min&&pct<r.max)return r.m;}
  return 2;
}

// ── 컨센서스 ──
const CONSENSUS_DS={2026:360,2027:440,2028:550,2029:480,2030:420};
const SAL_GROWTH=0.05;

// ── 포맷 ──
function fw(v){
  const a=Math.abs(v);
  if(a>=1e8)return `${(v/1e8).toFixed(2)}억원`;
  if(a>=1e4)return `${Math.round(v/1e4).toLocaleString()}만원`;
  return `${Math.round(v).toLocaleString()}원`;
}
function fwS(v){
  if(v>=1e8)return `${(v/1e8).toFixed(1)}억`;
  if(v>=1e4)return `${Math.round(v/1e4)}만`;
  return `${Math.round(v)}`;
}

// ── 색상 ──
const C={
  bg:"#06101d",card:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.09)",
  blue:"#1499ff",cyan:"#00d8ff",green:"#00f090",yellow:"#ffd060",
  red:"#ff5050",purple:"#b060ff",orange:"#ff9030",
  muted:"#4e6880",sub:"#8aaabb",text:"#ddeeff",
};

const Card=({children,accent,style={}})=>{
  const m={
    blue:["rgba(20,100,255,0.12)","rgba(20,153,255,0.38)"],
    green:["rgba(0,240,144,0.08)","rgba(0,240,144,0.38)"],
    yellow:["rgba(255,208,60,0.08)","rgba(255,208,60,0.3)"],
    purple:["rgba(176,96,255,0.09)","rgba(176,96,255,0.38)"],
    orange:["rgba(255,144,48,0.09)","rgba(255,144,48,0.35)"],
    red:["rgba(255,80,80,0.08)","rgba(255,80,80,0.3)"],
  };
  const [bg,bd]=m[accent]||[C.card,C.border];
  return <div style={{background:bg,border:`1px solid ${bd}`,borderRadius:14,padding:"18px 20px",...style}}>{children}</div>;
};
const SL=({c,children})=>(
  <div style={{fontSize:11,color:c||C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10}}>{children}</div>
);
const HR=()=><div style={{borderTop:`1px solid ${C.border}`,margin:"8px 0"}}/>;

function calcYear(divKey,annualWon,dsJo,yr){
  const opiInfo=getOpiInfo(dsJo);
  const opiGross=Math.round(annualWon*opiInfo.rate/100);
  const spGross=calcSpecial(divKey,dsJo*1e12,yr);
  const totGross=opiGross+spGross;
  const opiTax=marginalTax(annualWon,opiGross);
  const spTax=marginalTax(annualWon+opiGross,spGross);
  const totTax=opiTax+spTax;
  return {yr,dsJo,opiRate:opiInfo.rate,opiGross,spGross,totGross,
    opiTax,spTax,totTax,opiNet:opiGross-opiTax,spNet:spGross-spTax,totNet:totGross-totTax};
}

// ── 메인 앱 ──
function App(){
  const YEARS=[2026,2027,2028,2029,2030];
  const [divKey,setDivKey]=useState("memory");
  const [baseSal,setBaseSal]=useState(9000);
  const [salaries,setSalaries]=useState(
    Object.fromEntries(YEARS.map((yr,i)=>[yr,Math.round(9000*Math.pow(1.05,i))]))
  );
  const [dsProfit,setDsProfit]=useState({...CONSENSUS_DS});
  const [stockNow,setStockNow]=useState(322500);
  const [psuFut,setPsuFut]=useState(322500);
  const [tab,setTab]=useState("cumul");

  const handleBaseSal=(v)=>{
    setBaseSal(v);
    setSalaries(Object.fromEntries(YEARS.map((yr,i)=>[yr,Math.round(v*Math.pow(1+SAL_GROWTH,i))])));
  };

  const yearData=useMemo(()=>
    YEARS.map(yr=>calcYear(divKey,salaries[yr]*10000,dsProfit[yr],yr)),
    [divKey,salaries,dsProfit]
  );
  const cumul=useMemo(()=>({
    gross:yearData.reduce((s,r)=>s+r.totGross,0),
    tax:yearData.reduce((s,r)=>s+r.totTax,0),
    net:yearData.reduce((s,r)=>s+r.totNet,0),
    opi:yearData.reduce((s,r)=>s+r.opiNet,0),
    sp:yearData.reduce((s,r)=>s+r.spNet,0),
  }),[yearData]);

  const psuPct=Math.round((psuFut-PSU_BASE)/PSU_BASE*100);
  const psuMultV=getPsuMult(psuPct);
  const psuTotal=Math.round(PSU_SH*psuMultV);
  const psuPerYr=Math.round(psuTotal/3);
  const psuYrWon=psuPerYr*psuFut;
  const psuTotWon=psuTotal*psuFut;
  const psuTax28=marginalTax((salaries[2028]||0)*10000+(yearData.find(r=>r.yr===2028)?.totGross||0),psuYrWon);
  const psuTax29=marginalTax((salaries[2029]||0)*10000+(yearData.find(r=>r.yr===2029)?.totGross||0),psuYrWon);
  const psuTax30=marginalTax((salaries[2030]||0)*10000+(yearData.find(r=>r.yr===2030)?.totGross||0),psuYrWon);
  const psuNetArr=[psuYrWon-psuTax28,psuYrWon-psuTax29,psuYrWon-psuTax30];
  const psuTotNet=psuMultV>0?psuNetArr.reduce((s,v)=>s+v,0):0;
  const maxBar=Math.max(...yearData.map(r=>r.totGross),1);
  const YRC=["#1499ff","#00d8ff","#00f090","#ffd060","#ff9030"];

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg} 0%,#0b1726 100%)`,color:C.text}}>
      {/* 헤더 */}
      <div style={{borderBottom:`1px solid rgba(20,153,255,0.18)`,padding:"13px 20px",
        display:"flex",alignItems:"center",gap:12,background:"rgba(0,0,0,0.28)"}}>
        <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#1499ff,#0044bb)",
          display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:15,color:"#fff",flexShrink:0}}>S</div>
        <div>
          <div style={{fontSize:15,fontWeight:700}}>삼성전자 보상 시뮬레이터</div>
          <div style={{fontSize:10,color:C.muted}}>OPI · 특별경영성과급 · PSU · 2026 노사합의 · CL3</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {[["cumul","📊 5년 누적"],["psu","📈 PSU"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{
              padding:"5px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
              border:tab===k?`1.5px solid ${C.blue}`:`1px solid ${C.border}`,
              background:tab===k?"rgba(20,153,255,0.15)":"rgba(255,255,255,0.04)",
              color:tab===k?C.blue:C.muted}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:760,margin:"0 auto",padding:"18px 14px"}}>

      {tab==="cumul" && (<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <Card>
            <SL>소속 사업부</SL>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {Object.entries(DIV_INFO).map(([k,d])=>(
                <button key={k} onClick={()=>setDivKey(k)} style={{
                  padding:"9px 12px",borderRadius:9,cursor:"pointer",textAlign:"left",
                  border:divKey===k?`2px solid ${C.blue}`:`1px solid ${C.border}`,
                  background:divKey===k?"rgba(20,153,255,0.14)":"rgba(255,255,255,0.03)",
                  color:divKey===k?C.text:C.sub,fontWeight:divKey===k?700:400,fontSize:12,
                  display:"flex",justifyContent:"space-between",width:"100%"}}>
                  <span>{d.label}</span>
                  <span style={{fontSize:10,color:divKey===k?C.blue:C.muted}}>{divKey===k?"✓":d.deficit26?"적자":""}</span>
                </button>
              ))}
            </div>
          </Card>
          <Card>
            <SL>기준 연봉 (2026, 세전)</SL>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <input type="number" min={4000} max={30000} step={500} value={baseSal}
                onChange={e=>handleBaseSal(Number(e.target.value))}
                style={{background:"rgba(255,255,255,0.07)",border:`1px solid ${C.border}`,
                  borderRadius:9,color:C.yellow,fontSize:22,fontWeight:800,
                  padding:"9px 12px",width:150,textAlign:"right"}}/>
              <div>
                <div style={{fontSize:14,color:C.muted}}>만원</div>
                <div style={{fontSize:12,color:C.yellow,fontWeight:700}}>{(baseSal/10000).toFixed(2)}억</div>
              </div>
            </div>
            <input type="range" min={4000} max={20000} step={500} value={baseSal}
              onChange={e=>handleBaseSal(Number(e.target.value))}
              style={{accentColor:C.yellow,marginBottom:8}}/>
            <div style={{fontSize:10,color:C.muted}}>이후 연도 연 {SAL_GROWTH*100}% 자동 적용 · 아래 표에서 개별 수정 가능</div>
          </Card>
        </div>

        <Card style={{marginBottom:14}}>
          <SL>연도별 연봉 · DS 영업이익 입력 (컨센서스 기본값 · 개별 수정 가능)</SL>
          <div style={{marginBottom:10,padding:"8px 12px",borderRadius:8,
            background:"rgba(0,216,255,0.06)",border:"1px solid rgba(0,216,255,0.12)",
            fontSize:10,color:C.muted,lineHeight:1.7}}>
            📊 DS 컨센서스 — 2026: <strong style={{color:C.cyan}}>360조</strong> &nbsp;|&nbsp;
            2027: <strong style={{color:C.cyan}}>440조</strong> &nbsp;|&nbsp;
            2028: <strong style={{color:C.cyan}}>550조</strong> &nbsp;|&nbsp;
            2029: <strong style={{color:C.cyan}}>480조</strong> &nbsp;|&nbsp;
            2030: <strong style={{color:C.cyan}}>420조</strong>
            &nbsp;· KB·미래에셋·골드만삭스·DB 리포트 기준 평균
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {["귀속연도","수령연도","연봉(만원)","DS이익(조)","OPI율","OPI세전","특별성과급세전","합계세전","합계세후"].map(h=>(
                    <th key={h} style={{padding:"7px 6px",color:C.muted,fontSize:10,fontWeight:600,textAlign:"right",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {yearData.map((row,i)=>{
                  const yc=YRC[i];
                  return (
                    <tr key={row.yr} style={{borderBottom:`1px solid ${C.border}`}}>
                      <td style={{padding:"10px 6px",color:yc,fontWeight:700,fontSize:13}}>{row.yr}</td>
                      <td style={{padding:"10px 6px",color:C.muted,fontSize:11,textAlign:"right"}}>{row.yr+1}년</td>
                      <td style={{padding:"6px",textAlign:"right"}}>
                        <input type="number" min={4000} max={50000} step={100}
                          value={salaries[row.yr]}
                          onChange={e=>setSalaries(p=>({...p,[row.yr]:Number(e.target.value)}))}
                          style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,
                            borderRadius:6,color:C.yellow,fontSize:12,fontWeight:700,
                            padding:"5px 8px",width:90,textAlign:"right"}}/>
                      </td>
                      <td style={{padding:"6px",textAlign:"right"}}>
                        <input type="number" min={-20} max={600} step={10}
                          value={dsProfit[row.yr]}
                          onChange={e=>setDsProfit(p=>({...p,[row.yr]:Number(e.target.value)}))}
                          style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,
                            borderRadius:6,color:C.cyan,fontSize:12,fontWeight:700,
                            padding:"5px 8px",width:70,textAlign:"right"}}/>
                      </td>
                      <td style={{padding:"10px 6px",textAlign:"right",color:C.sub,fontSize:11}}>{row.opiRate}%</td>
                      <td style={{padding:"10px 6px",textAlign:"right",color:C.cyan,fontSize:11}}>{fwS(row.opiGross)}</td>
                      <td style={{padding:"10px 6px",textAlign:"right",color:C.yellow,fontSize:11}}>{fwS(row.spGross)}</td>
                      <td style={{padding:"10px 6px",textAlign:"right",color:C.text,fontWeight:600}}>{fw(row.totGross)}</td>
                      <td style={{padding:"10px 6px",textAlign:"right",color:yc,fontWeight:800,fontSize:13}}>{fw(row.totNet)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>

        <Card style={{marginBottom:14}}>
          <SL>연도별 성과급 규모 비교</SL>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {yearData.map((row,i)=>{
              const yc=YRC[i];
              const bW=Math.round(row.totGross/maxBar*100);
              const nW=Math.round(row.totNet/maxBar*100);
              const rgb=yc.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',');
              return (
                <div key={row.yr}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:11}}>
                    <span style={{color:yc,fontWeight:700}}>{row.yr}년 실적 ({row.yr+1}년 수령)</span>
                    <span style={{color:C.muted}}>세전 {fw(row.totGross)} → 세후 <strong style={{color:yc}}>{fw(row.totNet)}</strong></span>
                  </div>
                  <div style={{position:"relative",height:14,background:"rgba(255,255,255,0.05)",borderRadius:7,overflow:"hidden"}}>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${bW}%`,background:`rgba(${rgb},0.25)`,borderRadius:7}}/>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${nW}%`,background:yc,borderRadius:7}}/>
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:3,fontSize:10,color:C.muted}}>
                    <span>OPI {fw(row.opiNet)}</span>
                    <span>특별성과급 {fw(row.spNet)}</span>
                    <span style={{marginLeft:"auto"}}>세금 -{fw(row.totTax)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:10}}>━━ 5년 누적 성과급 합계 ━━</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <Card style={{textAlign:"center",padding:"20px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6}}>5년 세전 누적</div>
            <div style={{fontSize:36,fontWeight:900,color:C.text,lineHeight:1}}>{fw(cumul.gross)}</div>
            <div style={{fontSize:11,color:C.red,marginTop:5}}>세금 합계 -{fw(cumul.tax)}</div>
          </Card>
          <Card accent="green" style={{textAlign:"center",padding:"20px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6}}>✅ 5년 세후 누적</div>
            <div style={{fontSize:36,fontWeight:900,color:C.green,lineHeight:1}}>{fw(cumul.net)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:5}}>연평균 <strong style={{color:C.green}}>{fw(Math.round(cumul.net/5))}</strong></div>
          </Card>
        </div>

        <Card style={{marginBottom:12}}>
          <SL>5년 누적 항목별 세부</SL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[
              {l:"OPI 누적 (세후·현금)",v:cumul.opi,c:C.cyan},
              {l:"특별성과급 누적 (세후·자사주)",v:cumul.sp,c:C.yellow},
              {l:"PSU 누적 (세후·자사주)",v:psuMultV>0?psuTotNet:0,c:C.purple},
            ].map(item=>(
              <div key={item.l} style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"14px 10px"}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4,lineHeight:1.4}}>{item.l}</div>
                <div style={{fontSize:20,fontWeight:800,color:item.c}}>{fw(item.v)}</div>
              </div>
            ))}
          </div>
          <HR/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 4px"}}>
            <div>
              <div style={{fontSize:12,color:C.muted}}>PSU 포함 총 수령 (세후)</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>성과급 + PSU 3년 합산</div>
            </div>
            <div style={{fontSize:28,fontWeight:900,color:C.green}}>
              {fw(cumul.net+(psuMultV>0?psuTotNet:0))}
            </div>
          </div>
        </Card>

        <Card style={{marginBottom:12}}>
          <SL>누적 합계 진행</SL>
          <div style={{display:"flex",gap:0,alignItems:"flex-end",height:80,marginBottom:8}}>
            {yearData.map((row,i)=>{
              const cumNet=yearData.slice(0,i+1).reduce((s,r)=>s+r.totNet,0);
              const h=Math.round(cumNet/cumul.net*100);
              const yc=YRC[i];
              return (
                <div key={row.yr} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:10,color:yc,fontWeight:700}}>{fwS(cumNet)}</div>
                  <div style={{width:"70%",background:yc,borderRadius:"4px 4px 0 0",height:`${h}%`,minHeight:4}}/>
                  <div style={{fontSize:10,color:C.muted}}>{row.yr}</div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>각 연도 = 해당 연도까지의 누적 세후 수령액</div>
        </Card>

        <div style={{padding:"10px 14px",borderRadius:10,
          background:"rgba(255,200,50,0.05)",border:"1px solid rgba(255,200,50,0.15)",
          fontSize:10,color:"#7a8a9a",lineHeight:1.8}}>
          ⚠️ DS 컨센서스는 2026.06 기준 · OPI율 자동산출 · 누진세 적용(각종 공제 전) · 2029~2030 DS 전망은 추정값 · PSU는 별도 탭
        </div>
      </>)}

      {tab==="psu" && (<>
        <Card style={{marginBottom:12}}>
          <SL>주가 설정</SL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[
              {label:"현재 주가",val:stockNow,set:setStockNow,c:C.sub,note:"2026.06.12 종가"},
              {label:"2028년 예상 주가",val:psuFut,set:setPsuFut,c:C.purple,note:"PSU 평가 기준일"},
            ].map(({label,val,set,c,note})=>(
              <div key={label}>
                <div style={{fontSize:10,color:C.muted,marginBottom:5}}>{label}</div>
                <input type="number" min={50000} max={900000} step={5000} value={val}
                  onChange={e=>set(Number(e.target.value))}
                  style={{background:"rgba(255,255,255,0.07)",border:`1px solid ${C.border}`,
                    borderRadius:9,color:c,fontSize:18,fontWeight:800,
                    padding:"9px 12px",width:"100%",textAlign:"right"}}/>
                <div style={{fontSize:10,color:C.muted,marginTop:2}}>{note}</div>
              </div>
            ))}
          </div>
          <input type="range" min={50000} max={700000} step={5000} value={psuFut}
            onChange={e=>setPsuFut(Number(e.target.value))}
            style={{accentColor:C.purple,marginTop:12}}/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
            {[{l:"현재가",v:322500},{l:"40만",v:400000},{l:"50만",v:500000},{l:"2배(600주)",v:PSU_BASE*2},{l:"3배",v:PSU_BASE*3}].map(s=>(
              <button key={s.v} onClick={()=>setPsuFut(s.v)} style={{
                padding:"4px 11px",borderRadius:14,fontSize:10,fontWeight:600,cursor:"pointer",
                border:psuFut===s.v?`1.5px solid ${C.purple}`:`1px solid ${C.border}`,
                background:psuFut===s.v?"rgba(176,96,255,0.12)":"rgba(255,255,255,0.03)",
                color:psuFut===s.v?C.purple:C.muted}}>{s.l}</button>
            ))}
          </div>
        </Card>

        {psuMultV===0 ? (
          <Card accent="red" style={{textAlign:"center",padding:"28px"}}>
            <div style={{fontSize:36,marginBottom:6}}>❌</div>
            <div style={{fontSize:16,fontWeight:700,color:C.red}}>미지급</div>
            <div style={{fontSize:12,color:C.muted,marginTop:4}}>기준가(85,385원) 대비 상승률 {psuPct}% — 20% 미만 시 미지급</div>
          </Card>
        ):(<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
            {[
              {l:"기준가 대비",v:`+${psuPct}%`,c:psuPct>=100?C.green:psuPct>=40?C.yellow:C.orange},
              {l:"지급 배수",v:`${psuMultV}배`,c:C.purple},
              {l:"총 지급 주수",v:`${psuTotal}주`,c:C.purple},
            ].map(it=>(
              <Card key={it.l} accent="purple" style={{textAlign:"center",padding:"14px 8px"}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{it.l}</div>
                <div style={{fontSize:22,fontWeight:900,color:it.c}}>{it.v}</div>
              </Card>
            ))}
          </div>

          <Card style={{marginBottom:12}}>
            <SL>연도별 수령 시뮬레이션 (세전 · 세후)</SL>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[2028,2029,2030].map((yr,i)=>{
                const gross=psuYrWon;
                const tax=[psuTax28,psuTax29,psuTax30][i];
                const net=psuNetArr[i];
                const taxR=gross>0?Math.round(tax/gross*100):0;
                return (
                  <div key={yr} style={{background:"rgba(176,96,255,0.07)",border:`1px solid rgba(176,96,255,0.18)`,borderRadius:10,padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:14,fontWeight:800,color:C.purple}}>{yr}년 ({psuPerYr}주)</span>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:11,color:C.muted}}>세전 {fw(gross)}</div>
                        <div style={{fontSize:16,fontWeight:800,color:C.purple}}>세후 {fw(net)}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",height:7,borderRadius:4,overflow:"hidden",marginBottom:6}}>
                      <div style={{width:`${100-taxR}%`,background:C.purple}}/>
                      <div style={{width:`${taxR}%`,background:"rgba(255,80,80,0.5)"}}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      {[
                        {l:"세금",v:`-${fw(tax)} (${taxR}%)`,c:C.red},
                        {l:"월 환산",v:fw(Math.round(net/12)),c:C.cyan},
                        {l:"분기 환산",v:fw(Math.round(net/4)),c:C.cyan},
                      ].map(it=>(
                        <div key={it.l} style={{textAlign:"center"}}>
                          <div style={{fontSize:10,color:C.muted}}>{it.l}</div>
                          <div style={{fontSize:13,fontWeight:700,color:it.c,marginTop:2}}>{it.v}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          <Card accent="purple" style={{marginBottom:12}}>
            <SL c={C.purple}>PSU 3년 누적 (2028~2030)</SL>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}>
              <div style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:9,padding:"14px"}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>세전 합계</div>
                <div style={{fontSize:24,fontWeight:900,color:C.text}}>{fw(psuTotWon)}</div>
              </div>
              <div style={{textAlign:"center",background:"rgba(176,96,255,0.12)",borderRadius:9,padding:"14px",border:`1px solid rgba(176,96,255,0.3)`}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>✅ 세후 합계</div>
                <div style={{fontSize:24,fontWeight:900,color:C.purple}}>{fw(psuTotNet)}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[
                {l:"월 평균 (세후·36개월)",v:fw(Math.round(psuTotNet/36))},
                {l:"분기 평균 (12회)",v:fw(Math.round(psuTotNet/12))},
                {l:"현재가 기준 세전",v:fw(psuTotal*stockNow)},
              ].map(it=>(
                <div key={it.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{it.l}</div>
                  <div style={{fontSize:15,fontWeight:800,color:C.purple}}>{it.v}</div>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SL>주가 상승률별 지급 배수표</SL>
            <table style={{width:"100%",fontSize:11}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {["상승률","배수","주수","연간세전","연간세후","3년세후"].map(h=>(
                    <th key={h} style={{padding:"6px 4px",color:C.muted,fontSize:10,fontWeight:600,textAlign:"right"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {PSU_MULT_TABLE.map(row=>{
                  const sh=Math.round(PSU_SH*row.m);
                  const yrG=sh>0?Math.round(sh/3*psuFut):0;
                  const yrT=sh>0?marginalTax((salaries[2028]||0)*10000,yrG):0;
                  const yrN=yrG-yrT;
                  const isA=row.m===psuMultV;
                  return (
                    <tr key={row.min} style={{borderBottom:`1px solid ${C.border}`,background:isA?"rgba(176,96,255,0.1)":"transparent"}}>
                      <td style={{padding:"9px 4px",color:isA?C.purple:C.sub,fontWeight:isA?700:400}}>
                        {row.min}%{row.max<999?`~${row.max}%`:" 이상"}
                      </td>
                      <td style={{padding:"9px 4px",textAlign:"right",color:C.text}}>{row.m}배</td>
                      <td style={{padding:"9px 4px",textAlign:"right",color:isA?C.purple:C.text,fontWeight:isA?800:500}}>
                        {sh>0?`${sh}주`:"미지급"}
                      </td>
                      <td style={{padding:"9px 4px",textAlign:"right",color:C.sub}}>{sh>0?fw(yrG):"-"}</td>
                      <td style={{padding:"9px 4px",textAlign:"right",color:isA?C.purple:C.sub}}>{sh>0?fw(yrN):"-"}</td>
                      <td style={{padding:"9px 4px",textAlign:"right",color:isA?C.purple:C.sub,fontWeight:isA?800:400}}>
                        {sh>0?fw(yrN*3):"-"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </>)}
      </>)}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
