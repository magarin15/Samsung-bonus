<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>삼성전자 보상 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06101d;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;color:#ddeeff;}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.2);outline:none;cursor:pointer;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#1499ff;border:3px solid #ffffff;cursor:pointer;box-shadow:0 0 8px rgba(20,153,255,0.8);}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#1499ff;border:3px solid #ffffff;cursor:pointer;box-shadow:0 0 8px rgba(20,153,255,0.8);}
input[type=range]::-ms-thumb{width:24px;height:24px;border-radius:50%;background:#1499ff;border:3px solid #ffffff;cursor:pointer;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}
table{border-collapse:collapse;}
button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;


// ── 세금 ──
const TB=[{l:14e6,r:.066},{l:50e6,r:.165},{l:88e6,r:.264},{l:150e6,r:.385},{l:300e6,r:.418},{l:500e6,r:.451},{l:Infinity,r:.495}];
const tax=i=>{if(i<=0)return 0;let t=0,p=0;for(const b of TB){if(i<=p)break;t+=(Math.min(i,b.l)-p)*b.r;p=b.l;}return Math.round(t);};
const mTax=(base,add)=>tax(base+add)-tax(base);

// ── OPI ──
const OPI=[{max:0,r:0},{max:10,r:0},{max:20,r:14},{max:35,r:30},{max:50,r:40},{max:70,r:47},{max:999,r:50}];
const opiR=ds=>{for(const o of OPI)if(ds<=o.max)return o.r;return 50;};

// ── 특별성과급 ──
const DS_HC=79000;
const DIV={memory:{hc:27000,pw:.90,d:false},lsi:{hc:11500,pw:.04,d:true},foundry:{hc:11500,pw:.06,d:true},support:{hc:29000,pw:null,d:false}};
const sp=(k,w,yr)=>{
  if(k==='support')return Math.round(sp('memory',w,yr)*.70);
  const d=DIV[k],pool=w*.105,cph=(pool*.40)/DS_HC;
  if(d.d)return yr>=2027?Math.round(cph*.6):Math.round(cph);
  return Math.round(cph+(pool*.60*d.pw)/d.hc);
};

// ── PSU ──
const PSU_BASE=85385,PSU_SH=300;
const PSU_M=[{a:0,b:20,m:0},{a:20,b:40,m:.5},{a:40,b:60,m:1},{a:60,b:80,m:1.3},{a:80,b:100,m:1.7},{a:100,b:999,m:2}];
const psuM=p=>{for(const r of PSU_M)if(p>=r.a&&p<r.b)return r.m;return 2;};

// ── 포맷 ──
const fw=v=>{const a=Math.abs(v);if(a>=1e8)return`${(v/1e8).toFixed(2)}억원`;if(a>=1e4)return`${Math.round(v/1e4).toLocaleString()}만원`;return`${Math.round(v)}원`;};
const fs2=v=>v>=1e8?`${(v/1e8).toFixed(1)}억`:v>=1e4?`${Math.round(v/1e4)}만`:`${Math.round(v)}`;

// ── 색상 ──
const C={bg:"#06101d",bd:"rgba(255,255,255,0.09)",blue:"#1499ff",cyan:"#00d8ff",green:"#00f090",yellow:"#ffd060",red:"#ff5050",purple:"#b060ff",orange:"#ff9030",muted:"#4e6880",sub:"#8aaabb",text:"#ddeeff"};
const Card=({children,ac,style={}})=>{
  const bg=ac==='green'?"rgba(0,240,144,0.07)":ac==='purple'?"rgba(176,96,255,0.08)":"rgba(255,255,255,0.04)";
  const bd=ac==='green'?"rgba(0,240,144,0.35)":ac==='purple'?"rgba(176,96,255,0.35)":C.bd;
  return <div style={{background:bg,border:`1px solid ${bd}`,borderRadius:12,padding:"14px 16px",...style}}>{children}</div>;
};
const Label=({c,children})=><div style={{fontSize:10,color:c||C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>{children}</div>;

// ── 연도별 계산 ──
const calcYr=(dk,sal,ds,yr)=>{
  const og=Math.round(sal*opiR(ds)/100);
  const sg=sp(dk,ds*1e12,yr);
  const tg=og+sg;
  const ot=mTax(sal,og),st=mTax(sal+og,sg);
  return {yr,og,sg,tg,ot,st,tt:ot+st,on:og-ot,sn:sg-st,tn:tg-ot-st};
};

// ── 아파트 ──
const APTS=[
  {a:"강남구",c:"서울",p:26e8,col:"#ff5050",e:"🏆"},{a:"서초구",c:"서울",p:22e8,col:"#ff7030",e:"🏆"},
  {a:"송파구",c:"서울",p:19e8,col:"#ff9030",e:"⭐"},{a:"마포·용산",c:"서울",p:17e8,col:"#ffd060",e:"⭐"},
  {a:"성동·광진",c:"서울",p:15e8,col:"#c8d060",e:"⭐"},{a:"노원구",c:"서울",p:13e8,col:"#00d8ff",e:"✅"},
  {a:"강서·양천",c:"서울",p:11e8,col:"#00d8ff",e:"✅"},{a:"분당·판교",c:"경기",p:14e8,col:"#00f090",e:"✅"},
  {a:"광교·수원",c:"경기",p:9e8,col:"#4dff90",e:"✅"},{a:"용인·기흥",c:"경기",p:75e7,col:"#80ffa0",e:"✅"},
  {a:"인천 연수",c:"인천",p:65e7,col:"#b060ff",e:"✅"},{a:"인천 계양",c:"인천",p:5e8,col:"#c080ff",e:"✅"},
  {a:"김포·파주",c:"경기",p:45e7,col:"#8aaabb",e:"✅"},
];

const CONS={2026:360,2027:440,2028:550,2029:480,2030:420};
const YRS=[2026,2027,2028,2029,2030];
const SYR=[2027,2028,2029,2030,2031,2032,2033];
const YC=["#1499ff","#00d8ff","#00f090","#ffd060","#ff9030"];

function App(){
  const [dk,setDk]=useState("support");
  const [base,setBase]=useState(10000);
  const [sal,setSal]=useState(Object.fromEntries(YRS.map((y,i)=>[y,Math.round(10000*1.05**i)])));
  const [ds,setDs]=useState({...CONS});
  const [stkNow,setStkNow]=useState(322500);
  const [psuF,setPsuF]=useState(322500);
  const [tab,setTab]=useState("c");
  const [spx,setSpx]=useState(Object.fromEntries(SYR.map(y=>[y,322500])));
  const [agr,setAgr]=useState(0);
  const [aptGr,setAptGr]=useState(3);
  const [stkGr,setStkGr]=useState(10);
  const [cash,setCash]=useState(5);
  const [loan,setLoan]=useState(5);

  const hBase=v=>{setBase(v);setSal(Object.fromEntries(YRS.map((y,i)=>[y,Math.round(v*1.05**i)])));};
  const applyGr=r=>setSpx(Object.fromEntries(SYR.map((y,i)=>[y,Math.round(stkNow*((1+r/100)**(i+1)))])));

  const yd=useMemo(()=>YRS.map(y=>calcYr(dk,sal[y]*10000,ds[y],y)),[dk,sal,ds]);
  const cum=useMemo(()=>yd.reduce((s,r)=>({g:s.g+r.tg,t:s.t+r.tt,n:s.n+r.tn,oi:s.oi+r.on,sp:s.sp+r.sn}),{g:0,t:0,n:0,oi:0,sp:0}),[yd]);

  const pPct=Math.round((psuF-PSU_BASE)/PSU_BASE*100);
  const pM=psuM(pPct),pTot=Math.round(PSU_SH*pM),pYr=Math.round(pTot/3),pYW=pYr*psuF;
  const pt28=mTax((sal[2028]||0)*10000+(yd.find(r=>r.yr===2028)?.tg||0),pYW);
  const pt29=mTax((sal[2029]||0)*10000+(yd.find(r=>r.yr===2029)?.tg||0),pYW);
  const pt30=mTax((sal[2030]||0)*10000+(yd.find(r=>r.yr===2030)?.tg||0),pYW);
  const pNA=[pYW-pt28,pYW-pt29,pYW-pt30];
  const pNet=pM>0?pNA.reduce((s,v)=>s+v,0):0;

  const mxB=Math.max(...yd.map(r=>r.tg),1);
  const smMap=useMemo(()=>{
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      [[py,s1],[py+1,s2],[py+2,s3]].forEach(([y,sh])=>{m[y]=(m[y]||0)+sh*(spx[y]||stkNow);});});
    return m;
  },[yd,stkNow,spx]);
  const smE=Object.entries(smMap).sort((a,b)=>+a[0]-+b[0]);
  const smTot=Object.values(smMap).reduce((s,v)=>s+v,0);
  const spTotN=yd.reduce((s,r)=>s+r.sn,0);

  // 부동산
  const sAt=y=>Math.round(stkNow*(1+stkGr/100)**(y-2026));
  const aAt=(p,y)=>Math.round(p*(1+aptGr/100)**(y-2026));
  const aptYrs=[2027,2028,2029,2030,2031,2032,2033];
  const cbY=useMemo(()=>{
    const m={};
    yd.forEach(r=>{const py=r.yr+1,ts=Math.floor(r.sn/stkNow),s1=Math.floor(ts/3),s2=Math.floor(ts/3),s3=ts-s1-s2;
      m[py]=(m[py]||0)+r.on+s1*sAt(py);m[py+1]=(m[py+1]||0)+s2*sAt(py+1);m[py+2]=(m[py+2]||0)+s3*sAt(py+2);});
    [[2028,pNA[0]],[2029,pNA[1]],[2030,pNA[2]]].forEach(([y,v])=>{m[y]=(m[y]||0)+(pM>0?v:0);});
    let run=0;const cum={};aptYrs.forEach(y=>{run+=(m[y]||0);cum[y]=run;});
    return {cash:m,cum};
  },[yd,stkNow,stkGr,pNA,pM,aptGr]);
  const fcum=cbY.cum[2033]||0;
  const mxC=Math.max(...aptYrs.map(y=>cbY.cash[y]||0),1);

  const TABS=[["c","📊 5년 누적"],["l","🔒 자사주"],["p","📈 PSU"],["a","🏠 부동산"]];

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg},#0b1726)`,fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",color:C.text}}>
      {/* 헤더 */}
      <div style={{borderBottom:`1px solid rgba(20,153,255,0.18)`,padding:"11px 14px",display:"flex",alignItems:"center",gap:10,background:"rgba(0,0,0,0.28)"}}>
        <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#1499ff,#0044bb)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff"}}>S</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700}}>삼성전자 보상 시뮬레이터</div>
          <div style={{fontSize:9,color:C.muted}}>OPI·특별성과급·PSU·2026 노사합의·CL3</div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {TABS.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 9px",borderRadius:14,fontSize:10,fontWeight:600,cursor:"pointer",
              border:tab===k?`1.5px solid ${C.blue}`:`1px solid ${C.bd}`,
              background:tab===k?"rgba(20,153,255,0.15)":"rgba(255,255,255,0.04)",color:tab===k?C.blue:C.muted}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"14px 12px"}}>

      {/* ══ 5년 누적 ══ */}
      {tab==="c"&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <Card>
            <Label>소속 사업부</Label>
            {Object.entries(DIV).map(([k,d])=>(
              <button key={k} onClick={()=>setDk(k)} style={{display:"flex",justifyContent:"space-between",width:"100%",padding:"7px 10px",borderRadius:8,marginBottom:5,cursor:"pointer",
                border:dk===k?`2px solid ${C.blue}`:`1px solid ${C.bd}`,background:dk===k?"rgba(20,153,255,0.13)":"rgba(255,255,255,0.03)",
                color:dk===k?C.text:C.sub,fontWeight:dk===k?700:400,fontSize:11}}>
                <span>{{memory:"메모리",lsi:"시스템LSI",foundry:"파운드리",support:"지원·공통"}[k]}</span>
                <span style={{fontSize:9,color:dk===k?C.blue:C.muted}}>{dk===k?"✓":d.d?"적자":""}</span>
              </button>
            ))}
          </Card>
          <Card>
            <Label>기준 연봉 (2026, 세전)</Label>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <input type="number" min={4000} max={30000} step={500} value={base} onChange={e=>hBase(+e.target.value)}
                style={{background:"rgba(255,255,255,0.07)",border:`1px solid ${C.bd}`,borderRadius:8,color:C.yellow,fontSize:20,fontWeight:800,padding:"8px 10px",width:130,textAlign:"right"}}/>
              <div style={{fontSize:12,color:C.muted}}>만원<br/><span style={{color:C.yellow,fontWeight:700}}>{(base/10000).toFixed(2)}억</span></div>
            </div>
            <input type="range" min={4000} max={20000} step={500} value={base} onChange={e=>hBase(+e.target.value)} style={{width:"100%",accentColor:C.yellow,height:4,cursor:"pointer",marginBottom:6}}/>
            <div style={{fontSize:9,color:C.muted}}>이후 연 5% 자동 증가·아래 표에서 수정 가능</div>
          </Card>
        </div>

        <Card style={{marginBottom:12}}>
          <Label>연도별 입력 (DS 컨센서스 기본값)</Label>
          <div style={{fontSize:9,color:C.muted,marginBottom:8,padding:"5px 8px",borderRadius:6,background:"rgba(0,216,255,0.06)",border:`1px solid rgba(0,216,255,0.12)`}}>
            📊 2026:<strong style={{color:C.cyan}}>360조</strong> 2027:<strong style={{color:C.cyan}}>440조</strong> 2028:<strong style={{color:C.cyan}}>550조</strong> 2029:<strong style={{color:C.cyan}}>480조</strong> 2030:<strong style={{color:C.cyan}}>420조</strong> · KB·미래에셋·GS·DB 평균
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{borderBottom:`1px solid ${C.bd}`}}>
                {["귀속","수령","연봉(만)","DS(조)","OPI%","OPI세전","특별성과급","합계세전","합계세후"].map(h=>(
                  <th key={h} style={{padding:"5px 4px",color:C.muted,fontSize:9,fontWeight:600,textAlign:"right",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{yd.map((r,i)=>(
                <tr key={r.yr} style={{borderBottom:`1px solid ${C.bd}`}}>
                  <td style={{padding:"8px 4px",color:YC[i],fontWeight:700}}>{r.yr}</td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:C.muted,fontSize:9}}>{r.yr+1}</td>
                  <td style={{padding:"3px"}}>
                    <input type="number" min={4000} max={50000} step={100} value={sal[r.yr]} onChange={e=>setSal(p=>({...p,[r.yr]:+e.target.value}))}
                      style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.bd}`,borderRadius:5,color:C.yellow,fontSize:10,fontWeight:700,padding:"3px 5px",width:78,textAlign:"right"}}/>
                  </td>
                  <td style={{padding:"3px"}}>
                    <input type="number" min={-20} max={600} step={10} value={ds[r.yr]} onChange={e=>setDs(p=>({...p,[r.yr]:+e.target.value}))}
                      style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.bd}`,borderRadius:5,color:C.cyan,fontSize:10,fontWeight:700,padding:"3px 5px",width:55,textAlign:"right"}}/>
                  </td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:C.sub,fontSize:9}}>{opiR(ds[r.yr])}%</td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:C.cyan,fontSize:9}}>{fs2(r.og)}</td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:C.yellow,fontSize:9}}>{fs2(r.sg)}</td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:C.text,fontWeight:600,fontSize:10}}>{fw(r.tg)}</td>
                  <td style={{padding:"8px 4px",textAlign:"right",color:YC[i],fontWeight:800,fontSize:11}}>{fw(r.tn)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </Card>

        <Card style={{marginBottom:12}}>
          <Label>연도별 비교</Label>
          {yd.map((r,i)=>{const yc=YC[i],bw=Math.round(r.tg/mxB*100),nw=Math.round(r.tn/mxB*100),rgb=yc.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',');return(
            <div key={r.yr} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:10}}>
                <span style={{color:yc,fontWeight:700}}>{r.yr}년 실적({r.yr+1}년 수령)</span>
                <span style={{color:C.muted}}>세전 {fw(r.tg)} → 세후 <strong style={{color:yc}}>{fw(r.tn)}</strong></span>
              </div>
              <div style={{position:"relative",height:11,background:"rgba(255,255,255,0.05)",borderRadius:6,overflow:"hidden"}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${bw}%`,background:`rgba(${rgb},0.22)`,borderRadius:6}}/>
                <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${nw}%`,background:yc,borderRadius:6}}/>
              </div>
              <div style={{display:"flex",gap:10,marginTop:2,fontSize:9,color:C.muted}}>
                <span>OPI {fw(r.on)}</span><span>특별성과급 {fw(r.sn)}</span><span style={{marginLeft:"auto"}}>세금 -{fw(r.tt)}</span>
              </div>
            </div>
          );})}
        </Card>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <Card style={{textAlign:"center",padding:"18px"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:5}}>5년 세전 누적</div>
            <div style={{fontSize:30,fontWeight:900,color:C.text}}>{fw(cum.g)}</div>
            <div style={{fontSize:10,color:C.red,marginTop:4}}>세금 -{fw(cum.t)}</div>
          </Card>
          <Card ac="green" style={{textAlign:"center",padding:"18px"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:5}}>✅ 5년 세후 누적</div>
            <div style={{fontSize:30,fontWeight:900,color:C.green}}>{fw(cum.n)}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>연평균 <strong style={{color:C.green}}>{fw(Math.round(cum.n/5))}</strong></div>
          </Card>
        </div>
        <Card style={{marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[{l:"OPI(세후·현금)",v:cum.oi,c:C.cyan},{l:"특별성과급(세후·자사주)",v:cum.sp,c:C.yellow},{l:"PSU(세후·자사주)",v:pM>0?pNet:0,c:C.purple}].map(x=>(
              <div key={x.l} style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:9,padding:"12px 6px"}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:3,lineHeight:1.4}}>{x.l}</div>
                <div style={{fontSize:16,fontWeight:800,color:x.c}}>{fw(x.v)}</div>
              </div>
            ))}
          </div>
          <div style={{borderTop:`1px solid ${C.bd}`,margin:"10px 0 6px"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:C.muted}}>PSU 포함 총 수령 (세후)</span>
            <span style={{fontSize:24,fontWeight:900,color:C.green}}>{fw(cum.n+(pM>0?pNet:0))}</span>
          </div>
        </Card>
      </>}

              <div key={y} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2,fontSize:10}}>
                  <span style={{color:C.cyan,fontWeight:700}}>{y}년</span>
                  <div><span style={{color:C.green,fontWeight:700}}>{fw(v)}</span><span style={{color:C.muted,fontSize:9,marginLeft:6}}>누적 <strong style={{color:C.yellow}}>{fw(cv)}</strong></span></div>
                </div>
                <div style={{position:"relative",height:7,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden",marginBottom:2}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${bw}%`,background:"linear-gradient(90deg,#00d8ff,#00f090)",borderRadius:4}}/>
                </div>
                <div style={{position:"relative",height:4,background:"rgba(255,255,255,0.04)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${cbw}%`,background:"linear-gradient(90deg,rgba(255,208,60,.5),rgba(255,208,60,.9))",borderRadius:3}}/>
                </div>
              </div>
            );})}
          </Card>

          <Card style={{marginBottom:12}}>
            <Label>📅 연도별 매입 가능 지역 (2027~2033)</Label>
            <div style={{fontSize:9,color:C.muted,marginBottom:10,padding:"5px 8px",borderRadius:6,background:"rgba(0,216,255,0.06)",border:"1px solid rgba(0,216,255,0.14)"}}>
              매입 기준 = 현금({cash}억) + 대출({loan}억) + 성과급 누적 ≥ 해당 연도 아파트 시세
            </div>
            {aptYrs.map(y=>{
              const bf=(cash*1e8)+(loan*1e8)+(cbY.cum[y]||0);
              const ok=APTS.filter(a=>bf>=aptAt(a.p,y));
              const no=APTS.filter(a=>bf<aptAt(a.p,y)).map(a=>({...a,gap:aptAt(a.p,y)-bf})).sort((a,b)=>a.gap-b.gap);
              return(
                <div key={y} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${ok.length>0?"rgba(0,240,144,0.22)":C.bd}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ok.length>0?8:0}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:800,color:ok.length>0?C.green:C.muted}}>{y}년</span>
                      <span style={{fontSize:9,color:C.muted,marginLeft:8}}>총 자금 <strong style={{color:C.cyan}}>{fw(bf)}</strong></span>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:ok.length>0?C.green:C.muted}}>{ok.length>0?`✅ ${ok.length}개`:"❌ 해당없음"}</span>
                  </div>
                  {ok.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:no.length>0?8:0}}>
                    {ok.map(a=><div key={a.a} style={{background:"rgba(0,240,144,0.09)",border:"1px solid rgba(0,240,144,0.28)",borderRadius:7,padding:"4px 9px",fontSize:10}}>
                      <span style={{color:a.col,fontWeight:700}}>{a.e} {a.a}</span>
                      <span style={{color:C.muted,fontSize:9,marginLeft:4}}>{fw(aptAt(a.p,y))}</span>
                    </div>)}
                  </div>}
                  {no.length>0&&<div>
                    <div style={{fontSize:9,color:C.muted,marginBottom:4}}>📍 부족 (가까운 순)</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {no.slice(0,4).map(a=><div key={a.a} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${C.bd}`,borderRadius:7,padding:"3px 8px",fontSize:9}}>
                        <span style={{color:a.col}}>{a.a}</span><span style={{color:C.red,marginLeft:3}}>-{fw(a.gap)}</span>
                      </div>)}
                    </div>
                  </div>}
                </div>
              );
            })}
          </Card>
          <div style={{fontSize:9,color:"#4e6880",lineHeight:1.7,padding:"7px 10px",borderRadius:8,background:"rgba(255,200,50,0.04)",border:"1px solid rgba(255,200,50,0.12)"}}>
            ⚠️ 시세 2026.06 기준 84㎡ 추정치 · 취득세·중개수수료 미포함 · 대출 DSR·LTV 규제 별도
          </div>
        </>);
      })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
